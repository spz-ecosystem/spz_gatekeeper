name: Bug Report
description: 提交一个可复现的缺陷报告
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        感谢反馈。请尽量提供最小复现与环境信息。
  - type: textarea
    id: summary
    attributes:
      label: 问题描述
      description: 预期行为与实际行为
      placeholder: 清晰描述问题现象
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: env
    attributes:
      label: 环境信息
      description: OS / 编译器 / CMake / 依赖版本
      placeholder: 例如 Ubuntu 22.04, clang 17, cmake 3.28
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: 相关日志与截图
      render: shell
