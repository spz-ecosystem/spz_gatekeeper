# SPZ Gatekeeper CI - Based on spz2glb template

name: CI

on:
  push:
    branches: [ main, feature/spz-v2-profile-core ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: windows-build
          - os: ubuntu-latest
            artifact_name: linux-build
          - os: macos-latest
            artifact_name: macos-build

    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install dependencies (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y zlib1g-dev cmake g++

      - name: Install dependencies (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          brew install zlib cmake

      - name: Install vcpkg and dependencies (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          if (Test-Path "C:/vcpkg") {
            Write-Host "vcpkg already exists, skipping clone"
          } else {
            git clone https://github.com/microsoft/vcpkg.git C:/vcpkg --depth 1
          }
          if (Test-Path "C:/vcpkg/vcpkg.exe") {
            Write-Host "vcpkg.exe already exists, skipping bootstrap"
          } else {
            C:/vcpkg/bootstrap-vcpkg.bat -disableMetrics
          }
          C:/vcpkg/vcpkg install zlib:x64-windows

      - name: Configure CMake (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          cmake -S cpp -B build -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_BUILD_TYPE=Release `
            -DBUILD_TESTING=ON `
            -DSPZ_GATEKEEPER_BUILD_BENCHMARK_TESTS=OFF `
            "-DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake"

      - name: Configure CMake (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          cmake -S cpp -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_TESTING=ON \
            -DSPZ_GATEKEEPER_BUILD_BENCHMARK_TESTS=OFF

      - name: Configure CMake (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          cmake -S cpp -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_TESTING=ON \
            -DSPZ_GATEKEEPER_BUILD_BENCHMARK_TESTS=OFF \
            -DCMAKE_PREFIX_PATH="$(brew --prefix zlib)"

      - name: Build (with verbose output)
        run: |
          cmake --build build --config Release --parallel --verbose 2>&1 | tee build.log

      - name: Check build warnings
        if: always()
        run: |
          echo "=== Build Warnings ==="
          if [ -f build.log ]; then
            grep -i "warning" build.log || echo "No warnings found"
          fi
        shell: bash

      - name: Run Tests
        run: |
          ctest --test-dir build --output-on-failure -C Release

      - name: Release gate (Ubuntu, real compat-check)
        if: matrix.os == 'ubuntu-latest'
        run: |
          mkdir -p build/ci-gates
          ./build/spz_gatekeeper gen-fixture \
            --type 0xADBE0002 \
            --mode valid \
            --out build/ci-gates/release_valid.spz
          ./build/spz_gatekeeper compat-check build/ci-gates/release_valid.spz --json | tee build/ci-gates/release_gate.json
          python3 - <<'PY'
          import json
          from pathlib import Path

          data = json.loads(Path('build/ci-gates/release_gate.json').read_text(encoding='utf-8'))
          if data.get('policy_mode') != 'release':
              raise SystemExit('release gate: policy_mode must be release')
          if data.get('verdict') == 'block' or data.get('final_verdict') == 'block':
              raise SystemExit('release gate: block verdict is not allowed')
          budgets = data.get('budgets', {})
          for key in ('peak_memory_mb', 'memory_growth_count'):
              if key not in budgets:
                  raise SystemExit(f'release gate: missing critical budget {key}')
              if budgets[key].get('declared') in (None, ''):
                  raise SystemExit(f'release gate: missing declared threshold for {key}')
          print('release gate checks passed')
          PY

      - name: Challenge gate (Ubuntu, manifest aggregation)
        if: matrix.os == 'ubuntu-latest'
        run: |
          mkdir -p build/ci-gates
          ./build/spz_gatekeeper gen-fixture \
            --type 0xADBE0002 \
            --mode valid \
            --out build/ci-gates/challenge_pass.spz
          ./build/spz_gatekeeper gen-fixture \
            --type 0xADBE0002 \
            --mode invalid-size \
            --out build/ci-gates/challenge_block.spz

          cat > build/ci-gates/challenge_manifest.json <<'JSON'
          {
            "items": [
              {
                "path": "challenge_pass.spz",
                "scene_id": "scene-a",
                "group": "official",
                "split": "challenge",
                "difficulty": "easy"
              },
              {
                "path": "challenge_block.spz",
                "scene_id": "scene-b",
                "group": "official",
                "split": "challenge",
                "difficulty": "hard"
              }
            ]
          }
          JSON

          set +e
          ./build/spz_gatekeeper compat-check --manifest build/ci-gates/challenge_manifest.json --json > build/ci-gates/challenge_gate.json
          challenge_rc=$?
          set -e

          test "$challenge_rc" -eq 1
          python3 - <<'PY'
          import json
          from pathlib import Path

          data = json.loads(Path('build/ci-gates/challenge_gate.json').read_text(encoding='utf-8'))
          if data.get('policy_mode') != 'challenge':
              raise SystemExit('challenge gate: policy_mode must be challenge')
          summary = data.get('summary', {})
          if summary.get('total') != 2:
              raise SystemExit('challenge gate: summary.total must be 2')
          if summary.get('block') != 1:
              raise SystemExit('challenge gate: summary.block must be 1')
          if 'grouped_summary' not in data:
              raise SystemExit('challenge gate: grouped_summary is required')
          if not isinstance(data.get('items'), list) or len(data['items']) != 2:
              raise SystemExit('challenge gate: expected exactly 2 manifest items')
          print('challenge gate checks passed')
          PY

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}-logs
          path: build.log
          retention-days: 7

  wasm:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Emscripten SDK
        run: |
          git clone https://github.com/emscripten-core/emsdk.git --depth 1
          ./emsdk/emsdk install 3.1.56
          ./emsdk/emsdk activate 3.1.56
          echo "${GITHUB_WORKSPACE}/emsdk" >> "$GITHUB_PATH"
          echo "${GITHUB_WORKSPACE}/emsdk/upstream/emscripten" >> "$GITHUB_PATH"
          echo "EMSDK=${GITHUB_WORKSPACE}/emsdk" >> "$GITHUB_ENV"
          echo "EM_CONFIG=${GITHUB_WORKSPACE}/emsdk/.emscripten" >> "$GITHUB_ENV"

      - name: Configure CMake (Emscripten)
        run: |
          emcmake cmake -S cpp -B build-wasm \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_TESTING=OFF \
            -DSPZ_GATEKEEPER_BUILD_BENCHMARK_TESTS=OFF

      - name: Build WASM
        run: |
          emmake cmake --build build-wasm --parallel

      - name: Build native fixture generator (Ubuntu)
        run: |
          sudo apt-get update
          sudo apt-get install -y zlib1g-dev cmake g++
          cmake -S cpp -B build-native \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_TESTING=OFF \
            -DSPZ_GATEKEEPER_BUILD_BENCHMARK_TESTS=OFF
          cmake --build build-native --parallel

      - name: Generate synthetic fixture for browser smoke
        run: |
          mkdir -p build-wasm/site
          ./build-native/spz_gatekeeper gen-fixture \
            --type 0xADBE0002 \
            --mode valid \
            --out build-wasm/site/synthetic_valid.spz

      - name: Verify WASM artifact
        run: |
          test -f build-wasm/site/spz_gatekeeper.js
          test -f build-wasm/site/index.html
          test -f build-wasm/site/synthetic_valid.spz

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install browser test dependencies
        run: |
          npm install --no-save @playwright/test
          npx playwright install --with-deps chromium

      - name: Run WASM browser smoke test
        run: |
          python3 -m http.server 4173 --directory build-wasm/site > wasm-http.log 2>&1 &
          SERVER_PID=$!
          trap 'kill ${SERVER_PID}' EXIT
          for i in {1..20}; do
            if curl -fsS http://127.0.0.1:4173/index.html > /dev/null; then
              break
            fi
            sleep 1
          done
          node tests/wasm_smoke_test.mjs http://127.0.0.1:4173 build-wasm/site/synthetic_valid.spz build-native/spz_gatekeeper | tee wasm-smoke.log

      - name: Upload WASM smoke logs on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: wasm-smoke-logs
          path: |
            wasm-http.log
            wasm-smoke.log
            wasm-smoke-failure.png
          retention-days: 7

      - name: Upload WASM artifact
        uses: actions/upload-artifact@v7
        with:
          name: wasm-build
          path: build-wasm/site
