# Simple workflow for deploying static content to GitHub Pages
name: Deploy static content to Pages

on:
  # 仅在手动触发时运行，避免覆盖主 `pages.yml` 的 WASM 部署产物
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages-static"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Emscripten SDK
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 3.1.56

      - name: Configure CMake (Emscripten)
        run: |
          emcmake cmake -S cpp -B build-static \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_TESTING=OFF \
            -DSPZ_GATEKEEPER_BUILD_BENCHMARK_TESTS=OFF

      - name: Build WASM
        run: |
          emmake cmake --build build-static --parallel

      - name: Prepare Pages artifact
        run: |
          test -f build-static/site/spz_gatekeeper.js
          test -f build-static/site/index.html
          mkdir -p site
          cp -R build-static/site/. site/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
