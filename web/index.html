<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SPZ Validator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --brand-purple: #6666ff;
      --success-green: #10b981;
      --warning-yellow: #f59e0b;
      --text-primary: #1e293b;
      --text-secondary: #64748b;
      --text-muted: #94a3b8;
      --bg-top: #f0f4ff;
      --bg-bottom: #f8fafc;
      --card-hover-bg: #f8faff;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
      min-height: 100vh;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(180deg, var(--bg-top) 0%, var(--bg-bottom) 100%);
      color: var(--text-primary);
      display: flex;
      flex-direction: column;
      position: relative;
      overflow-x: hidden;
    }

    /* 3D点云SVG背景 */
    .bg-particles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
      opacity: 0.15;
    }

    .bg-particles svg {
      width: 100%;
      height: 100%;
    }

    .particle {
      fill: var(--brand-purple);
      animation: float 25s infinite ease-in-out;
    }

    @keyframes float {
      0%, 100% { transform: translate(0, 0); }
      25% { transform: translate(20px, -30px); }
      50% { transform: translate(-10px, -50px); }
      75% { transform: translate(15px, -20px); }
    }

    /* 主容器 */
    .main-wrapper {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      z-index: 1;
      padding: 30px 20px 0;
    }

    /* 顶部标题 */
    .header-title {
      font-size: 14px;
      font-weight: 400;
      color: var(--text-secondary);
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 0;
    }

    /* 内容区 - 垂直居中 */
    .content-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      width: 100%;
      padding: 40px 0;
    }

    /* 上传主卡片 */
    .upload-card {
      width: 40%;
      min-width: 360px;
      background: #ffffff;
      border-radius: 20px;
      box-shadow: 0 8px 32px rgba(102, 102, 255, 0.12);
      padding: 48px 32px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s ease;
      border: 2px solid transparent;
      position: relative;
    }

    .upload-card:hover {
      box-shadow: 0 12px 40px rgba(102, 102, 255, 0.18);
      transform: translateY(-2px);
    }

    .upload-card.dragover {
      border: 2px dashed var(--brand-purple);
      background: var(--card-hover-bg);
    }

    .upload-card input[type="file"] {
      display: none;
    }

    /* 云+文件图标 */
    .upload-icon {
      margin-bottom: 16px;
    }

    .upload-icon svg {
      width: 32px;
      height: 32px;
      color: var(--brand-purple);
    }

    /* 主文字 */
    .upload-main-text {
      font-size: 18px;
      font-weight: 500;
      color: var(--text-primary);
      margin: 12px 0;
    }

    /* 辅助文字 */
    .upload-sub-text {
      font-size: 14px;
      font-weight: 400;
      color: var(--text-secondary);
      line-height: 1.5;
      margin-bottom: 20px;
    }

    /* 加载状态 */
    .loading-status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      font-weight: 400;
      color: var(--warning-yellow);
    }

    .loading-status.ready {
      color: var(--success-green);
    }

    .loading-spinner {
      width: 14px;
      height: 14px;
      border: 2px solid var(--warning-yellow);
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    .loading-status.ready .loading-spinner {
      display: none;
    }

    .check-icon {
      display: none;
      width: 14px;
      height: 14px;
    }

    .loading-status.ready .check-icon {
      display: block;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* 功能卡片区 */
    .features-section {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
      width: 40%;
      min-width: 360px;
      margin-top: 80px;
    }

    .feature-card {
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
      padding: 24px 20px;
      transition: all 0.3s ease;
    }

    .feature-card:hover {
      box-shadow: 0 6px 24px rgba(0, 0, 0, 0.1);
      transform: translateY(-1px);
    }

    .feature-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }

    .feature-icon {
      font-size: 18px;
      line-height: 1;
    }

    .feature-title {
      font-size: 15px;
      font-weight: 500;
      color: var(--text-primary);
    }

    .feature-desc {
      font-size: 13px;
      font-weight: 400;
      color: var(--text-secondary);
      line-height: 1.5;
      padding-left: 28px;
    }

    /* 页脚 */
    .footer {
      text-align: center;
      padding: 20px;
      font-size: 12px;
      font-weight: 400;
      color: var(--text-muted);
      position: relative;
      z-index: 1;
    }

    /* 响应式 */
    @media (max-width: 768px) {
      .upload-card,
      .features-section {
        width: 90%;
        min-width: auto;
      }

      .features-section {
        grid-template-columns: 1fr;
        margin-top: 40px;
      }

      .upload-card {
        padding: 36px 24px;
      }
    }
  </style>
</head>
<body>
  <!-- 3D点云SVG背景 -->
  <div class="bg-particles">
    <svg viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
      <defs>
        <radialGradient id="particleGrad" cx="50%" cy="50%" r="50%">
          <stop offset="0%" style="stop-color:#6666ff;stop-opacity:0.8" />
          <stop offset="100%" style="stop-color:#6666ff;stop-opacity:0" />
        </radialGradient>
      </defs>
      <!-- 生成多个粒子点 -->
      <circle class="particle" cx="200" cy="300" r="3" style="animation-delay:0s"/>
      <circle class="particle" cx="500" cy="150" r="2" style="animation-delay:2s"/>
      <circle class="particle" cx="800" cy="400" r="4" style="animation-delay:4s"/>
      <circle class="particle" cx="1100" cy="200" r="2" style="animation-delay:6s"/>
      <circle class="particle" cx="1400" cy="500" r="3" style="animation-delay:8s"/>
      <circle class="particle" cx="1700" cy="250" r="2" style="animation-delay:10s"/>
      <circle class="particle" cx="300" cy="600" r="3" style="animation-delay:12s"/>
      <circle class="particle" cx="600" cy="700" r="2" style="animation-delay:14s"/>
      <circle class="particle" cx="900" cy="550" r="4" style="animation-delay:16s"/>
      <circle class="particle" cx="1200" cy="650" r="2" style="animation-delay:18s"/>
      <circle class="particle" cx="1500" cy="450" r="3" style="animation-delay:20s"/>
      <circle class="particle" cx="1800" cy="600" r="2" style="animation-delay:22s"/>
      <circle class="particle" cx="100" cy="450" r="2" style="animation-delay:1s"/>
      <circle class="particle" cx="400" cy="250" r="3" style="animation-delay:3s"/>
      <circle class="particle" cx="700" cy="350" r="2" style="animation-delay:5s"/>
      <circle class="particle" cx="1000" cy="150" r="3" style="animation-delay:7s"/>
      <circle class="particle" cx="1300" cy="400" r="2" style="animation-delay:9s"/>
      <circle class="particle" cx="1600" cy="300" r="4" style="animation-delay:11s"/>
      <circle class="particle" cx="250" cy="750" r="2" style="animation-delay:13s"/>
      <circle class="particle" cx="550" cy="850" r="3" style="animation-delay:15s"/>
      <circle class="particle" cx="850" cy="750" r="2" style="animation-delay:17s"/>
      <circle class="particle" cx="1150" cy="850" r="3" style="animation-delay:19s"/>
      <circle class="particle" cx="1450" cy="700" r="2" style="animation-delay:21s"/>
      <circle class="particle" cx="1750" cy="800" r="3" style="animation-delay:23s"/>
    </svg>
  </div>

  <!-- 主容器 -->
  <div class="main-wrapper">
    <!-- 顶部标题 -->
    <header class="header-title">SPZ VALIDATOR</header>

    <!-- 内容区 -->
    <div class="content-area">
      <!-- 上传主卡片 -->
      <div class="upload-card" id="dropZone">
        <input type="file" id="fileInput" accept=".spz">
        
        <!-- 云+文件图标 -->
        <div class="upload-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9Z"/>
            <path d="M12 11v6"/>
            <path d="M9 14h6"/>
          </svg>
        </div>

        <div class="upload-main-text">点击或拖拽 .spz 文件至此</div>
        <div class="upload-sub-text">支持 SPZ v4 格式验证，纯本地处理，无文件上传</div>

        <div class="loading-status" id="loadingStatus">
          <div class="loading-spinner"></div>
          <svg class="check-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
          <span id="statusText">正在加载 WASM 引擎...</span>
        </div>
      </div>

      <!-- 功能卡片区 -->
      <div class="features-section">
        <div class="feature-card">
          <div class="feature-header">
            <span class="feature-icon" style="color: var(--success-green);">✅</span>
            <span class="feature-title">全量格式验证</span>
          </div>
          <div class="feature-desc">深度解析 SPZ 二进制结构，校验验证魔数、S1 阶数与点云完整性</div>
        </div>

        <div class="feature-card">
          <div class="feature-header">
            <span class="feature-icon" style="color: var(--brand-purple);">🔒</span>
            <span class="feature-title">保护渲染管线</span>
          </div>
          <div class="feature-desc">3D 高斯点云数据复原，将其作为同线程组件，可有效避免渲染或异常的压缩文件进入您的渲染流水线或服务存储中</div>
        </div>

        <div class="feature-card">
          <div class="feature-header">
            <span class="feature-icon" style="color: var(--text-secondary);">🌐</span>
            <span class="feature-title">纯本地绝对安全</span>
          </div>
          <div class="feature-desc">WASM 本地执行，文件不上传，零网络传输与隐私泄露风险</div>
        </div>
      </div>
    </div>
  </div>

  <!-- 页脚 -->
  <footer class="footer">
    © 2026 SPZ Ecosystem | Powered by WebAssembly
  </footer>

  <!-- 交互逻辑 -->
  <script>
    (function() {
      const dropZone = document.getElementById('dropZone');
      const fileInput = document.getElementById('fileInput');
      const loadingStatus = document.getElementById('loadingStatus');
      const statusText = document.getElementById('statusText');

      // 模拟 WASM 加载完成
      setTimeout(() => {
        loadingStatus.classList.add('ready');
        statusText.textContent = 'WASM 引擎就绪';
      }, 2000);

      // 阻止默认拖拽行为
      ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
        dropZone.addEventListener(eventName, preventDefaults, false);
        document.body.addEventListener(eventName, preventDefaults, false);
      });

      function preventDefaults(e) {
        e.preventDefault();
        e.stopPropagation();
      }

      // 拖拽进入/离开效果
      ['dragenter', 'dragover'].forEach(eventName => {
        dropZone.addEventListener(eventName, () => {
          dropZone.classList.add('dragover');
        }, false);
      });

      ['dragleave', 'drop'].forEach(eventName => {
        dropZone.addEventListener(eventName, () => {
          dropZone.classList.remove('dragover');
        }, false);
      });

      // 点击上传
      dropZone.addEventListener('click', () => {
        fileInput.click();
      });

      // 文件选择
      fileInput.addEventListener('change', function() {
        if (this.files && this.files.length > 0) {
          handleFile(this.files[0]);
        }
      });

      // 拖拽放下
      dropZone.addEventListener('drop', function(e) {
        const dt = e.dataTransfer;
        const files = dt.files;
        if (files && files.length > 0) {
          handleFile(files[0]);
        }
      });

      function handleFile(file) {
        console.log('文件已选择:', file.name, '大小:', formatBytes(file.size));
        // 这里可以添加实际的文件处理逻辑
        alert('已选择文件: ' + file.name + '\n大小: ' + formatBytes(file.size));
      }

      function formatBytes(bytes) {
        if (bytes === 0) return '0 B';
        const k = 1024;
        const sizes = ['B', 'KB', 'MB', 'GB'];
        const i = Math.floor(Math.log(bytes) / Math.log(k));
        return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
      }
    })();
  </script>
</body>
</html>
