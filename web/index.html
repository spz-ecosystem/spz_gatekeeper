<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SPZ Gatekeeper | WASM Inspector</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      /* Typography Scale (Modular) */
      --font-xs: 0.75rem;     /* 12px */
      --font-sm: 0.875rem;    /* 14px */
      --font-base: 1rem;      /* 16px */
      --font-lg: 1.125rem;    /* 18px */
      --font-xl: 1.25rem;     /* 20px */
      --font-2xl: 1.5rem;     /* 24px */
      --font-3xl: 1.875rem;   /* 30px */
      --font-4xl: 2.25rem;    /* 36px */
      --font-5xl: 3rem;       /* 48px */

      /* Line Heights */
      --lh-heading: 1.2;
      --lh-body: 1.6;
      --lh-ui: 1.4;

      /* Spacing Scale (8-pt grid) */
      --space-1: 0.25rem;   /* 4px */
      --space-2: 0.5rem;    /* 8px */
      --space-3: 0.75rem;   /* 12px */
      --space-4: 1rem;      /* 16px */
      --space-5: 1.25rem;   /* 20px */
      --space-6: 1.5rem;    /* 24px */
      --space-8: 2rem;      /* 32px */
      --space-10: 2.5rem;   /* 40px */
      --space-12: 3rem;     /* 48px */
      --space-16: 4rem;     /* 64px */

      /* Colors - Dark Theme Focus */
      --bg-primary: #111827;
      --bg-secondary: #1f2937;
      --text-primary: #f9fafb;
      --text-secondary: #9ca3af;
      --border: #374151;

      --color-primary: #2563eb;
      --color-primary-hover: #1d4ed8;
      --color-primary-active: #1e40af;
      --color-primary-soft: rgba(37, 99, 235, 0.15);

      --color-success: #16a34a;
      --color-success-bg: rgba(22, 163, 74, 0.15);
      --color-warning: #ca8a04;
      --color-error: #dc2626;
      --color-error-bg: rgba(220, 38, 38, 0.15);
      --color-info: #0891b2;

      /* Animation Easings */
      --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
      --ease-in: cubic-bezier(0.55, 0, 1, 0.45);
      --ease-in-out: cubic-bezier(0.65, 0, 0.35, 1);
      --spring: cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background-color: var(--bg-primary);
      color: var(--text-primary);
      line-height: var(--lh-body);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: var(--space-8) var(--space-4);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    h1 {
      font-size: clamp(2rem, 5vw + 1rem, 3.5rem);
      line-height: var(--lh-heading);
      font-weight: 700;
      letter-spacing: -0.025em;
      margin-bottom: var(--space-2);
      color: var(--text-primary);
    }

    .subtitle {
      font-size: clamp(1rem, 2vw + 0.5rem, 1.125rem);
      line-height: var(--lh-body);
      color: var(--text-secondary);
      max-width: 65ch;
      margin-inline: auto;
    }

    header {
      text-align: center;
      margin-bottom: var(--space-10);
      width: 100%;
    }

    .container {
      width: 100%;
      max-width: 800px;
      display: flex;
      flex-direction: column;
      gap: var(--space-6);
    }

    .card {
      background-color: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--space-4);
      padding: var(--space-6);
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -2px rgba(0, 0, 0, 0.1);
      transition: transform 0.2s var(--ease-out), box-shadow 0.2s var(--ease-out);
    }

    .upload-zone {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: var(--space-12) var(--space-8);
      border: 2px dashed var(--border);
      border-radius: var(--space-3);
      cursor: pointer;
      position: relative;
      background-color: transparent;
      transition: all 0.2s var(--ease-out);
    }

    .upload-zone:hover, .upload-zone.dragover {
      border-color: var(--color-primary);
      background-color: var(--color-primary-soft);
      transform: translateY(-2px);
    }

    .upload-zone svg {
      width: var(--space-10);
      height: var(--space-10);
      color: var(--text-secondary);
      margin-bottom: var(--space-4);
      transition: color 0.2s var(--ease-out), transform 0.2s var(--spring);
    }

    .upload-zone:hover svg, .upload-zone.dragover svg {
      color: var(--color-primary);
      transform: scale(1.1);
    }

    .upload-zone span {
      font-weight: 600;
      font-size: var(--font-lg);
      color: var(--text-primary);
      margin-bottom: var(--space-1);
    }

    .upload-zone small {
      color: var(--text-secondary);
      font-size: var(--font-sm);
    }

    #fileInput {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
    }

    .status-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: var(--font-sm);
      color: var(--text-secondary);
      margin-bottom: var(--space-4);
      line-height: var(--lh-ui);
    }

    .status-indicator {
      display: flex;
      align-items: center;
      gap: var(--space-2);
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background-color: var(--color-warning);
      animation: pulse 2s ease-in-out infinite;
    }

    .status-dot.ready { 
      background-color: var(--color-success);
      animation: none;
    }
    .status-dot.error { 
      background-color: var(--color-error); 
      animation: none;
    }

    .result-section {
      display: none;
      flex-direction: column;
      gap: var(--space-4);
    }

    .result-section.visible {
      display: flex;
      animation: fadeIn 0.3s var(--ease-out) forwards;
    }

    .file-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-bottom: var(--space-4);
      border-bottom: 1px solid var(--border);
      margin-bottom: var(--space-2);
    }

    .file-title {
      font-weight: 600;
      font-size: var(--font-base);
    }

    .file-size {
      color: var(--text-secondary);
      font-size: var(--font-sm);
      margin-left: var(--space-2);
    }

    .controls {
      display: flex;
      gap: var(--space-2);
      flex-wrap: wrap;
    }

    button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: var(--space-2) var(--space-4);
      background-color: transparent;
      border: 1px solid var(--border);
      border-radius: var(--space-2);
      color: var(--text-secondary);
      font-family: inherit;
      font-size: var(--font-sm);
      font-weight: 500;
      line-height: var(--lh-ui);
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: background-color 0.2s var(--ease-out), color 0.2s var(--ease-out), border-color 0.2s var(--ease-out);
    }

    button:hover {
      background-color: var(--bg-secondary);
      color: var(--text-primary);
      border-color: var(--text-secondary);
    }

    button.active {
      background-color: var(--color-primary);
      color: #ffffff;
      border-color: var(--color-primary);
    }

    .badge {
      display: inline-flex;
      align-items: center;
      padding: 0 var(--space-2);
      height: 24px;
      border-radius: 12px;
      font-size: var(--font-xs);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .badge.success { 
      background-color: var(--color-success-bg); 
      color: var(--color-success); 
    }
    .badge.error { 
      background-color: var(--color-error-bg); 
      color: var(--color-error); 
    }

    pre {
      font-family: 'JetBrains Mono', monospace;
      font-size: var(--font-sm);
      background-color: #0d1117;
      color: #c9d1d9;
      padding: var(--space-4);
      border-radius: var(--space-2);
      border: 1px solid #30363d;
      overflow-x: auto;
      overflow-y: auto;
      max-height: 500px;
      line-height: var(--lh-body);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }

  </style>
</head>
<body>

  <header>
    <h1>SPZ Gatekeeper</h1>
    <p class="subtitle">WebAssembly powered SPZ compression validation</p>
  </header>

  <main class="container">
    <div class="card">
      <div class="status-bar">
        <div class="status-indicator">
          <div class="status-dot" id="wasmStatusDot"></div>
          <span id="wasmStatusText">Loading WASM module...</span>
        </div>
        <div>v1.0.0</div>
      </div>

      <div class="upload-zone" id="dropZone">
        <input type="file" id="fileInput" accept=".spz">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path>
        </svg>
        <span>Drag & Drop your .spz file here</span>
        <small>or click to browse files</small>
      </div>
    </div>

    <div class="card result-section" id="resultSection">
      <div class="file-meta">
        <div>
          <strong id="filenameDisplay" class="file-title">filename.spz</strong>
          <span id="filesizeDisplay" class="file-size"></span>
        </div>
        <div>
          Status: <span id="validationBadge" class="badge"></span>
        </div>
      </div>

      <div class="controls">
        <button id="btnTextReport" class="active">Text Report</button>
        <button id="btnJsonDetails">JSON Details</button>
        <button id="btnTrailer">Trailer Extensions</button>
      </div>

      <div id="outputContainer">
        <pre id="outputPre">Select a file to begin inspection.</pre>
      </div>
    </div>
  </main>

  <!-- Load the WASM module -->
  <script type="module">
    import createSpzGatekeeperModule from './spz_gatekeeper.js';

    let spzModule = null;
    let currentFileData = null;
    let currentFileName = "";

    const elDot = document.getElementById('wasmStatusDot');
    const elStatus = document.getElementById('wasmStatusText');
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const resultSection = document.getElementById('resultSection');
    const filenameDisplay = document.getElementById('filenameDisplay');
    const filesizeDisplay = document.getElementById('filesizeDisplay');
    const outputPre = document.getElementById('outputPre');
    const validationBadge = document.getElementById('validationBadge');

    const btns = {
      text: document.getElementById('btnTextReport'),
      json: document.getElementById('btnJsonDetails'),
      trailer: document.getElementById('btnTrailer')
    };

    // Initialize WASM
    async function initWasm() {
      try {
        spzModule = await createSpzGatekeeperModule();
        elDot.className = 'status-dot ready';
        elStatus.textContent = 'WASM Ready';
        console.log("SPZ Gatekeeper WASM initialized.");
      } catch (err) {
        elDot.className = 'status-dot error';
        elStatus.textContent = 'Failed to load WASM';
        console.error("WASM load error:", err);
      }
    }

    initWasm();

    // Drag and drop handling
    ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
      dropZone.addEventListener(eventName, preventDefaults, false);
    });

    function preventDefaults(e) {
      e.preventDefault();
      e.stopPropagation();
    }

    ['dragenter', 'dragover'].forEach(eventName => {
      dropZone.addEventListener(eventName, () => dropZone.classList.add('dragover'), false);
    });

    ['dragleave', 'drop'].forEach(eventName => {
      dropZone.addEventListener(eventName, () => dropZone.classList.remove('dragover'), false);
    });

    dropZone.addEventListener('drop', (e) => {
      let dt = e.dataTransfer;
      let files = dt.files;
      if (files.length) handleFile(files[0]);
    });

    fileInput.addEventListener('change', function(e) {
      if (this.files.length) handleFile(this.files[0]);
    });

    function formatBytes(bytes, decimals = 2) {
      if (!+bytes) return '0 Bytes';
      const k = 1024;
      const dm = decimals < 0 ? 0 : decimals;
      const sizes = ['Bytes', 'KB', 'MB', 'GB'];
      const i = Math.floor(Math.log(bytes) / Math.log(k));
      return `${parseFloat((bytes / Math.pow(k, i)).toFixed(dm))} ${sizes[i]}`;
    }

    function handleFile(file) {
      if (!spzModule) {
        alert("WASM module is not loaded yet.");
        return;
      }
      
      currentFileName = file.name;
      filenameDisplay.textContent = currentFileName;
      filesizeDisplay.textContent = formatBytes(file.size);
      
      const reader = new FileReader();
      reader.onload = function(e) {
        const arrayBuffer = e.target.result;
        currentFileData = new Uint8Array(arrayBuffer);
        
        resultSection.classList.add('visible');
        renderTextReport();
      };
      reader.readAsArrayBuffer(file);
    }

    function updateActiveBtn(activeKey) {
      Object.keys(btns).forEach(k => btns[k].classList.remove('active'));
      btns[activeKey].classList.add('active');
    }

    // Ripple Effect for buttons
    document.querySelectorAll('button').forEach(button => {
      button.addEventListener('click', function (e) {
        const rect = this.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;
        
        const ripple = document.createElement('span');
        ripple.classList.add('ripple');
        const diameter = Math.max(rect.width, rect.height);
        ripple.style.width = ripple.style.height = `${diameter}px`;
        ripple.style.left = `${x - diameter / 2}px`;
        ripple.style.top = `${y - diameter / 2}px`;
        
        this.appendChild(ripple);
        
        setTimeout(() => {
          ripple.remove();
        }, 600);
      });
    });

    // Handlers
    btns.text.addEventListener('click', () => renderTextReport());
    btns.json.addEventListener('click', () => renderJsonDetails());
    btns.trailer.addEventListener('click', () => renderTrailer());

    function renderTextReport() {
      updateActiveBtn('text');
      if (!currentFileData) return;
      try {
        const text = spzModule.inspectSpzText(currentFileData, true);
        outputPre.textContent = text;
        
        // Quick check if errors exist in text (heuristic)
        if (text.includes("error [")) {
          validationBadge.textContent = "Error";
          validationBadge.className = "badge error";
        } else {
          validationBadge.textContent = "Valid SPZ";
          validationBadge.className = "badge success";
        }
      } catch (err) {
        outputPre.textContent = "Exception: " + err.message;
        validationBadge.textContent = "Crash";
        validationBadge.className = "badge error";
      }
    }

    function renderJsonDetails() {
      updateActiveBtn('json');
      if (!currentFileData) return;
      try {
        const result = spzModule.inspectSpz(currentFileData, true);
        outputPre.textContent = JSON.stringify(result, null, 2);
      } catch (err) {
        outputPre.textContent = "Exception: " + err.message;
      }
    }

    function renderTrailer() {
      updateActiveBtn('trailer');
      if (!currentFileData) return;
      try {
        const result = spzModule.dumpTrailer(currentFileData, true);
        outputPre.textContent = JSON.stringify(result, null, 2);
      } catch (err) {
        outputPre.textContent = "Exception: " + err.message;
      }
    }
  </script>
</body>
</html>
